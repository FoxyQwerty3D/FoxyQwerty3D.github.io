<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoxyQwerty 3D</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #fff;
        }

        header {
            background-color: #000;
            padding: 20px;
            text-align: center;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        nav ul li {
            display: inline;
            margin-right: 30px;
        }

        nav ul li a {
            color: #fff;
            text-decoration: none;
            font-size: 18px;
        }

        main {
            padding: 50px 20px;
        }

        .section {
            display: none;
        }

        .active {
            display: block;
        }

        footer {
            background-color: #000;
            padding: 20px;
            text-align: center;
        }

        /* 아트스테이션 이미지 배경 설정 */
        #aboutSection {
            position: relative;
            color: #fff;
            padding: 100px 20px; /* 이미지가 잘 보이도록 패딩을 추가 */
            background: url('https://cdnb.artstation.com/p/assets/images/images/082/754/705/large/foxyqwerty-foxyqwerty-divingdeeper04.jpg?1733847494L') no-repeat center center fixed;
            background-size: cover;
        }

    </style>
    <script>
        function showSection(sectionId) {
            const sections = document.querySelectorAll('.section');
            sections.forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(sectionId).classList.add('active');
        }
    </script>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="javascript:void(0);" onclick="showSection('aboutSection')">ABOUT</a></li>
                <li><a href="javascript:void(0);" onclick="showSection('portfolioSection')">PORTFOLIO</a></li>
                <li><a href="javascript:void(0);" onclick="showSection('commissionSection')">COMMISSION</a></li>
                <li><a href="javascript:void(0);" onclick="showSection('contactSection')">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="aboutSection" class="section active">
            <h1>About FoxyQwerty</h1>
            <p>FoxyQwerty입니다.</p>
            <p>3D Modeling / Look Dev</p>
        </section>

        <section id="portfolioSection" class="section">
            <h1>Portfolio</h1>
            <p>다양한 작업을 소개합니다.</p>
        </section>

        <section id="commissionSection" class="section">
            <h1>Commission</h1>
            <p>커미션 작업에 대한 안내 및 가격은 이곳에서 확인하실 수 있습니다.</p>
        </section>

        <section id="contactSection" class="section">
            <h1>Contact</h1>
            <p>문의 사항은 여기에서 연락해 주세요.</p>
        </section>
    </main>

    <footer>
        <p>© 2024 FoxyQwerty 3D</p>
    </footer>
</body>
</html>
