<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOXYQWERTY 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Noto Sans', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f4f4f9;
        }
        header {
            background-color: #4e73df;
            color: white;
            padding: 20px 0;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .banner {
            background-image: url('https://cdnb.artstation.com/p/assets/images/images/082/754/705/large/foxyqwerty-foxyqwerty-divingdeeper04.jpg?1733847494');
            background-size: cover;
            background-position: center;
            padding: 170px 20px;
            color: white;
            text-align: center;
        }
        .banner h2 {
            font-size: 37px;
            opacity: 0;
            transform: translateY(30px); /* 처음에는 아래로 위치 */
            transition: opacity 1s ease, transform 1s ease;
        }
        .banner p {
            font-size: 20px;
            opacity: 0;
            transform: translateY(30px); /* 처음에는 아래로 위치 */
            transition: opacity 1s ease, transform 1s ease;
        }
        .content {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4개의 카드가 일정한 크기로 배치 */
            gap: 20px; /* 카드 간 간격 */
            padding: 40px;
            margin-left: 20px; /* 왼쪽 벽면과 20px 간격 */
            margin-right: 20px; /* 오른쪽 벽면과 20px 간격 */
        }
        .card {
            background-color: white;
            padding: 60px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            opacity: 0; /* 처음에는 보이지 않음 */
            transform: translateY(50px); /* 처음 위치를 아래로 설정 */
            transition: all 0.6s ease-in-out; /* 애니메이션 속도를 0.6초로 설정 */
        }
        .card.show {
            opacity: 1;
            transform: translateY(0); /* 보이면서 위로 올라옴 */
        }
        .card h3 {
            margin-bottom: 15px; /* 제목과 본문 사이에 15px 여백 추가 */
        }
        .card p {
            margin-bottom: 10px; /* 본문과 본문 사이에도 약간의 여백 추가 */
        }
        footer {
            background-color: rgba(9, 9, 9, 0.2); /* 배경에만 투명도 적용 */
            color: white;
            text-align: center;
            padding: 10px 0;
        }
        .card a {
            color: #4e73df;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="banner">
        <h2>FOXYQWERTY 3D</h2>
        <p>3D modeling / Look Dev</p>
    </div>

    <div class="content">
        <div class="card" id="about">
            <h3>About Me</h3>
            <p>Korean</p>
            <p>3D Major</p>
            <p>Maya / 3Ds Max / ZBrush / Unity / etc.</p>
        </div>
        <div class="card" id="portfolio">
            <h3>Portfolio</h3>
            <p>Check out my works! </p>
            <a href="https://www.artstation.com/foxyqwerty3d" target="_blank">VIEW ARTSTATION ></a>
        </div>
        <div class="card" id="commission">
            <h3>Commission</h3>
            <p>close.<div class="GapViewItemselected">2025 / 02 open</div></p>
        </div>
        <div class="card" id="contact">
            <h3>Contact</h3>
            <p>coraline0120@gmail.com</p>
            <p>x.com/FoxyQwerty3D</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 FOXYQWERTY 3D. All rights reserved.</p>
    </footer>

    <script>
        // 페이지 로드 시 바로 카드 애니메이션을 실행
        document.addEventListener('DOMContentLoaded', () => {
            // 배너 애니메이션 처리
            const bannerTitle = document.querySelector('.banner h2');
            const bannerDescription = document.querySelector('.banner p');
            
            setTimeout(() => {
                bannerTitle.style.opacity = 1;
                bannerTitle.style.transform = 'translateY(0)';
            }, 300); // 0.3초 후에 나타나도록 설정

            setTimeout(() => {
                bannerDescription.style.opacity = 1;
                bannerDescription.style.transform = 'translateY(0)';
            }, 600); // 0.6초 후에 나타나도록 설정

            // 카드 애니메이션 처리
            const cards = document.querySelectorAll('.card');
            cards.forEach((card, index) => {
                setTimeout(() => {
                    card.classList.add('show'); // 페이지 로드 시 바로 카드 애니메이션 적용
                }, 200 * index); // 0.2초씩 딜레이 주기
            });
        });
    </script>

</body>
</html>
