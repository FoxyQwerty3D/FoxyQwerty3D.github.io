<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캐릭터 메인 배너 웹사이트</title>
    <style>
        /* 전체 페이지 스타일 */
        body, html {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: Arial, sans-serif;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* 헤더 스타일 */
        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 40px;
            background-color: #f9f9f9;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        header nav {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        header nav a {
            margin: 0 30px;
            font-size: 16px;
            color: #333;
            font-weight: 600;
        }

        /* 메인 배너 스타일 */
        .banner {
            position: relative;
            height: 500px;
            background-color: #5B57D9;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
            text-align: center;
        }

        .banner .background-img {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            object-fit: cover;
            filter: brightness(70%);
            z-index: 1;
        }

        .banner .character-layer {
            position: absolute;
            bottom: 0;
            width: auto;
            height: 450px;
            z-index: 2;
            animation: parallax 1.5s ease-out;
        }

        @keyframes parallax {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .banner-content {
            position: relative;
            z-index: 3;
        }

        .banner-content h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .banner-content p {
            font-size: 18px;
            opacity: 0.9;
        }

        .banner-content a {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 20px;
            background-color: #6C63FF;
            border-radius: 25px;
            color: #fff;
        }

        /* 카드 섹션 */
        .cards {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            padding: 50px 10%;
        }

        .card {
            width: 400px; /* 카드 가로 길이 */
            background-color: #f9f9f9;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
            margin: 10px;
            text-align: center;
        }

        .card img {
            width: 100%;
            height: auto;
            display: block;
        }

        .card h3 {
            font-size: 20px;
            margin: 15px 0 10px;
        }

        .card p {
            font-size: 14px;
            color: #555;
            padding: 0 10px;
            margin-bottom: 15px;
        }

        .card a {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 16px;
            background-color: #6C63FF;
            color: #fff;
            border-radius: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- 헤더 -->
    <header>
        <nav>
            <a href="#">Home</a>
            <a href="#">Virtual</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- 메인 배너 -->
    <section class="banner">
        <!-- 아트스테이션 링크 배경 이미지 -->
        <img src="https://cdnb.artstation.com/p/assets/images/images/082/754/705/large/foxyqwerty-foxyqwerty-divingdeeper04.jpg?1733847494" alt="메인 배너 배경" class="background-img">

        <!-- 캐릭터 레이어 이미지 -->
        <img src="https://www.artstation.com" alt="캐릭터 이미지" class="character-layer">

        <div class="banner-content">
            <h1>FoxyQwerty</h1>
          <p>3D Modeling / Look Dev</p>
            <a href="https://www.artstation.com" target="_blank">Read More</a>
        </div>
    </section>

    <!-- 카드 섹션 -->
    <section class="cards">
        <div class="card">
            <img src="https://via.placeholder.com/400x250" alt="카드 이미지 1">
            <h3>Card 1</h3>
            <p>카드 1의 설명 내용을 작성하세요.</p>
            <a href="#">자세히 보기</a>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/400x250" alt="카드 이미지 2">
            <h3>Card 2</h3>
            <p>카드 2의 설명 내용을 작성하세요.</p>
            <a href="#">자세히 보기</a>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/400x250" alt="카드 이미지 3">
            <h3>Card 3</h3>
            <p>카드 3의 설명 내용을 작성하세요.</p>
            <a href="#">자세히 보기</a>
        </div>
    </section>
</body>
</html>
