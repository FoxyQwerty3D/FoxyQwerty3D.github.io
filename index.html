<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캐릭터 메인 배너 웹사이트</title>
    <style>
        /* 전체 페이지 스타일 */
        body, html {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: Arial, sans-serif;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* 헤더 스타일 */
        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 40px;
            background-color: #f9f9f9;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        header nav {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        header nav a {
            margin: 0 30px;
            font-size: 16px;
            color: #333;
            font-weight: 600;
            cursor: pointer;
        }

        /* 메인 배너 스타일 */
        .banner {
            position: relative;
            height: 500px;
            background-color: #5B57D9;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
            text-align: center;
        }

        .banner.hidden {
            display: none; /* 숨김 처리 */
        }

        .banner .background-img {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            object-fit: cover;
            filter: brightness(70%);
            z-index: 1;
        }

        .banner .character-layer {
            position: absolute;
            bottom: 0;
            width: auto;
            height: 450px;
            z-index: 2;
            animation: parallax 1.5s ease-out;
        }

        @keyframes parallax {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .banner-content {
            position: relative;
            z-index: 3;
        }

        .banner-content h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .banner-content p {
            font-size: 18px;
            opacity: 0.9;
        }

        .banner-content a {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 20px;
            background-color: #6C63FF;
            border-radius: 25px;
            color: #fff;
        }

        /* 카드 섹션 */
        .cards {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            padding: 50px 10%;
        }

        .card {
            width: 400px;
            background-color: #f9f9f9;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
            margin: 10px;
            text-align: center;
        }

        .card img {
            width: 100%;
            height: auto;
            display: block;
        }

        .card h3 {
            font-size: 20px;
            margin: 15px 0 10px;
        }

        .card p {
            font-size: 14px;
            color: #555;
            padding: 0 10px;
            margin-bottom: 15px;
        }

        .card a {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 16px;
            background-color: #6C63FF;
            color: #fff;
            border-radius: 20px;
            font-size: 14px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- 헤더 -->
    <header>
        <nav>
            <a href="#" id="home-link">Home</a>
            <a href="#" id="virtual-link">Virtual</a>
            <a href="#" id="contact-link">Contact</a>
        </nav>
    </header>

    <!-- 메인 배너 -->
    <section class="banner" id="main-banner">
        <img src="https://cdnb.artstation.com/p/assets/images/images/082/754/705/large/foxyqwerty-foxyqwerty-divingdeeper04.jpg?1733847494" alt="메인 배너 배경" class="background-img">
        <img src="https://www.artstation.com" alt="캐릭터 이미지" class="character-layer">
        <div class="banner-content">
            <h1>FoxyQwerty</h1>
            <p>3D Modeling / Look Dev</p>
            <a href="https://www.artstation.com" target="_blank">Go Artstation</a>
        </div>
    </section>

    <!-- 카드 섹션 -->
    <section class="cards" id="card-section">
        <!-- 첫 번째 카드 (이미지 없음) -->
        <div class="card">
            <h3>About Me</h3>
            <p>Korean</p>
            <p>3D Modeling, Chinese Major</p>
            <h3>Skils</h3>
            <p>Maya / 3Ds Max / ZBrush / Substance Painter / Clip Studio / PhotoShop / Premiere Pro / After Effects / Unity</p>
            <h3>Contact</h3>
            <p>coraline0120@gmail.com</p>
            <a href="https://x.com/FoxyQwerty3D" target="_blank">Go X (Twitter)</a>
        </div>
    </section>

    <!-- JavaScript -->
    <script>
        const homeLink = document.getElementById('home-link');
        const virtualLink = document.getElementById('virtual-link');
        const contactLink = document.getElementById('contact-link');
        const mainBanner = document.getElementById('main-banner');
        const cardSection = document.getElementById('card-section');

        function updatePageVisibility(page) {
            if (page === 'home') {
                mainBanner.classList.remove('hidden');
                cardSection.classList.remove('hidden');
            } else {
                mainBanner.classList.add('hidden');
                cardSection.classList.add('hidden');
            }
        }

        homeLink.addEventListener('click', () => updatePageVisibility('home'));
        virtualLink.addEventListener('click', () => updatePageVisibility('virtual'));
        contactLink.addEventListener('click', () => updatePageVisibility('contact'));
    </script>
</body>
</html>
